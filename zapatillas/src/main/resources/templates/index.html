<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flex Royale</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/stilos.css}">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>

<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-2 fixed-top shadow">

    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand d-flex align-items-center" href="#">

            <img th:src="@{/img/logo.jpg}"
                 width="35"
                 class="me-2">

            <span class="fw-bold fs-4">
                Flex Royale
            </span>

        </a>

        <!-- BOTÓN RESPONSIVE -->
        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- MENÚ -->
        <div class="collapse navbar-collapse"
             id="navbarNav">

            <!-- LINKS -->
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link active" href="#">
                        Inicio
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="#productos">
                        Productos
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="#registro">
                        Registro
                    </a>

                </li>

            </ul>

            <!-- BOTONES DERECHA -->
            <div class="navbar-nav ms-auto d-flex align-items-center gap-2">

                <!-- CARRITO -->
                <button class="btn btn-outline-light position-relative"
                        data-bs-toggle="modal"
                        data-bs-target="#cartModal"
                        title="Ver carrito">

                    <i class="bi bi-cart3"></i>

                    <span id="cart-badge"
                          class="position-absolute top-0 start-100 translate-middle badge bg-danger d-none">

                        0

                    </span>

                </button>

                <!-- LOGIN -->
                <div sec:authorize="isAnonymous()">

                    <a th:href="@{/login}"
                       class="btn btn-outline-light">

                        Iniciar sesión

                    </a>

                </div>

                <!-- USUARIO -->
                <div sec:authorize="isAuthenticated()"
                     class="text-light">

                    Hola,
                    <span id="nombreUsuario"
      th:data-email="${#authentication.name}">
</span>

                </div>

                <!-- LOGOUT -->
                <div sec:authorize="isAuthenticated()">

                    <form th:action="@{/logout}"
                          method="post">

                        <button type="submit"
                                class="btn btn-outline-light">

                            Cerrar sesión

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</nav>
</header>

<!-- PORTADA -->
<section class="py-5 bg-light mt-5">
  <img th:src="@{/img/imagenpresentación.png}" class="img-fluid d-block mx-auto">
</section>

<!-- PRODUCTOS -->
<section id="productos" class="py-5">
<div class="container">

  <div class="text-center mb-5">
    <h2 class="fw-bold">Productos</h2>
    <p class="text-muted">Encuentra el calzado ideal para ti</p>
  </div>

  <div class="row g-4">

    <div class="col-md-4" th:each="producto : ${productos}">
      
      <div class="card h-100 shadow-sm">

        <img th:src="@{/img/{imagen}(imagen=${producto.imagen})}"
             class="card-img-top"
             alt="Producto">

        <div class="card-body d-flex flex-column">

          <h5 class="card-title"
              th:text="${producto.nombre}">
          </h5>

          <p class="card-text text-muted"
             th:text="${producto.descripcion}">
          </p>

          <p class="fw-bold">
            S/ <span th:text="${producto.precio}"></span>
          </p>

          <!-- BOTONES -->
          <div class="mt-auto d-grid gap-2">

            <!-- BOTÓN VER -->
            <button 
                class="btn btn-primary btn-sm"

                data-bs-toggle="modal"
                data-bs-target="#productoModal"

                th:attr="
                  data-nombre=${producto.nombre},
                  data-imagen=${producto.imagen},
                  data-precio=${producto.precio},
                  data-descripcion=${producto.descripcion}">

                Ver

            </button>

            <!-- BOTÓN CARRITO -->
            <button 
                class="btn btn-dark agregar-carrito"

                th:attr="
                  data-id=${producto.nombre},
                  data-nombre=${producto.nombre},
                  data-precio=${producto.precio}">

                <i class="bi bi-cart-plus"></i>
                Agregar

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
</section>

<!-- TABLA DE PRODUCTOS -->
<section class="pb-5">
<div class="container">

  <table class="table table-hover text-center shadow">

    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Modelo</th>
        <th>Precio</th>
        <th>Acción</th>
      </tr>
    </thead>

    <tbody>

      <tr th:each="producto, iter : ${productos}">

        <td th:text="${iter.count}"></td>

        <td th:text="${producto.nombre}"></td>

        <td>
          S/ <span th:text="${producto.precio}"></span>
        </td>

        <td>
          <button 
    class="btn btn-primary btn-sm btn-ver"

    data-bs-toggle="modal"
    data-bs-target="#productoModal"

    th:attr="
      data-nombre=${producto.nombre},
      data-imagen=${producto.imagen},
      data-precio=${producto.precio},
      data-descripcion=${producto.descripcion}">

    Ver

</button>
        </td>

      </tr>

    </tbody>

  </table>

</div>
</section>

<!-- MODAL PRODUCTO -->
<div class="modal fade" id="productoModal" tabindex="-1">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title" id="modalNombre"></h5>

        <button class="btn-close" data-bs-dismiss="modal"></button>

      </div>

      <div class="modal-body text-center">

        <img id="modalImagen"
             class="img-fluid rounded mb-3"
             width="300">

        <h4 id="modalPrecio"></h4>

        <p id="modalDescripcion"></p>

      </div>

    </div>

  </div>

</div>

<!-- REGISTRO (simple) -->
<section id="registro" class="py-5 bg-dark text-white">
<div class="container">
  <div class="col-md-6 mx-auto">

    <h2 class="text-center mb-4">Registro</h2>

    <form th:action="@{/register}" method="post">
      <input name="name" class="form-control mb-3" placeholder="Nombre" required>
      <input name="email" type="email" class="form-control mb-3" placeholder="Correo" required>
      <input name="password" type="password" class="form-control mb-3" placeholder="Contraseña" required>

      <button type="submit" class="btn btn-primary w-100">Registrarse</button>
    </form>

  </div>
</div>
</section>

<!-- FOOTER -->
<footer class="py-4 bg-black text-white text-center">
  <p class="fw-bold">Flex Royale</p>
  <p class="text-muted">Calzado para todos</p>
</footer>


<!-- Modal del Carrito de Compras -->
<div class="modal fade" id="cartModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Mi Carrito de Compras</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Contenedor del carrito vacío -->
        <div id="cart-empty" class="alert alert-info text-center">
          Tu carrito está vacío
        </div>
        <!-- Contenedor de items del carrito (se llena dinámicamente) -->
        <div id="cart-items-container"></div>
      </div>
      <div class="modal-footer">
        <div id="cart-total" class="fw-bold">Total: $0.00</div>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-primary" id="checkout-btn">Comprar</button>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/animaciones.js}"></script>
<script th:src="@{/modal.js}"></script>
<script th:src="@{/carrito.js}"></script>
<script th:src="@{/navbar.js}"></script>
</body>
</html>
